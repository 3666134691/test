<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试查询站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: linear-gradient(120deg, #e6f2ff, #cfe7fb);
            min-height: 100vh;
        }

        .wrap {
            width: 90%;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 4px 18px rgba(45, 140, 240, 0.15);
        }

        .login-box h2 {
            color: #1967b3;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 280px;
            padding: 14px 16px;
            border: 1px solid #b3d8f4;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .login-box button {
            margin-top: 20px;
            padding: 12px 36px;
            background: #2d8cf0;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .search-page {
            display: none;
            background: #fff;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 4px 18px rgba(45, 140, 240, 0.15);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .search-title {
            color: #1967b3;
            margin-bottom: 25px;
            font-size: 20px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        select, .form-row input {
            padding: 12px 14px;
            border: 1px solid #b3d8f4;
            border-radius: 8px;
            font-size: 15px;
            min-width: 140px;
            outline: none;
        }

        .btn {
            padding: 12px 28px;
            background: #2d8cf0;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-green {
            background: #19be6b;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f5f9ff;
            border-radius: 8px;
            word-break: break-all;
        }

        .batch-bar {
            margin: 20px 0;
            text-align: center;
        }

        .image-box {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .image-item {
            width: 100%;
            max-width: 750px;
            text-align: center;
        }

        .image-item img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .download-btn {
            margin-top: 10px;
            padding: 8px 18px;
            background: #19be6b;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.2);
            display: none;
            text-align: center;
        }
        .modal input {
            margin: 15px 0;
            padding: 10px;
            width: 200px;
            border: 1px solid #b3d8f4;
            border-radius: 6px;
            outline: none;
        }
        .modal button {
            margin: 0 8px;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="login-box" id="loginBox">
            <h2>内部资料查询</h2>
            <input type="password" id="pwd" placeholder="请输入访问密钥">
            <br>
            <button onclick="checkPwd()" class="btn">验证进入</button>
        </div>

        <div class="search-page" id="searchPage">
            <div class="search-title">选择查询条件</div>
            <div class="form-row">
                <select id="subject">
                    <option value="">选择学科</option>
                    <option value="CH">语文 CH</option>
                    <option value="MS">数学 MS</option>
                    <option value="EN">英语 EN</option>
                </select>

                <select id="grade">
                    <option value="">选择年级</option>
                    <option value="7B">7B 七年级下册</option>
                    <option value="8A">8A 八年级上册</option>
                    <option value="8B">8B 八年级下册</option>
                    <option value="9A">9A 九年级上册</option>
                    <option value="9B">9B 九年级下册</option>
                </select>

                <select id="type">
                    <option value="">资料类型</option>
                    <option value="DXA">导学案 DXA</option>
                    <option value="SJ">试卷 SJ</option>
                    <option value="XT">习题 XT</option>
                </select>

                <input type="text" id="lesson" placeholder="输入课时 如11.1">
                <button onclick="startSearch()" class="btn">查询</button>
            </div>

            <div class="result" id="result"></div>

            <div class="batch-bar">
                <button class="btn btn-green" id="batchDownBtn" style="display:none;" onclick="batchDownload()">批量下载所有图片</button>
            </div>

            <div class="image-box" id="imageBox"></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <p>输入页码（单页填1，区间填1-3）</p>
        <input type="text" id="pageInput" placeholder="例：1-3">
        <br><br>
        <button onclick="loadImages()" class="btn">预览并加载</button>
        <button onclick="onlyGetFile()" class="btn btn-green">仅获取不预览</button>
        <button onclick="closeModal()">取消</button>
    </div>

    <script>
        const PASSWD = "1403";
        const EXTS = ["png", "jpg", "jpeg", "webp", "gif"];
        // 纯本地相对路径，不写任何线上域名
        let currentPath = "";
        let pageList = [];
        let imageData = [];

        // 密钥登录
        function checkPwd() {
            let v = document.getElementById("pwd").value.trim();
            if (v === PASSWD) {
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("searchPage").style.display = "block";
            } else {
                alert("密钥错误");
            }
        }

        // 拼接本地路径 保留RES
        function startSearch() {
            let sub = document.getElementById("subject").value;
            let gra = document.getElementById("grade").value;
            let typ = document.getElementById("type").value;
            let les = document.getElementById("lesson").value.trim();

            if (!sub || !gra || !typ || !les) {
                alert("请完整选择所有条件");
                return;
            }

            // 纯本地相对路径
            currentPath = `RES/${sub}/${gra}/${typ}/${les}/`;
            document.getElementById("result").innerText = "本地路径：" + currentPath;
            document.getElementById("imageBox").innerHTML = "";
            imageData = [];
            document.getElementById("batchDownBtn").style.display = "none";
            document.getElementById("modal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
            document.getElementById("pageInput").value = "";
        }

        // 解析页码范围
        function parsePageRange() {
            let val = document.getElementById("pageInput").value.trim();
            let start, end;
            if (val.includes("-")) {
                let arr = val.split("-");
                start = parseInt(arr[0]);
                end = parseInt(arr[1]);
            } else {
                start = end = parseInt(val);
            }
            pageList = [];
            imageData = [];
            for (let i = start; i <= end; i++) {
                pageList.push(i);
            }
        }

        // 预览加载图片
        function loadImages() {
            closeModal();
            parsePageRange();
            document.getElementById("imageBox").innerHTML = "";
            pageList.forEach(page => tryLoadImg(page, true));
        }

        // 仅获取不预览 → 直接有下载按钮
        function onlyGetFile() {
            closeModal();
            parsePageRange();
            pageList.forEach(page => tryLoadImg(page, false));
        }

        // 尝试多格式加载
        function tryLoadImg(page, needPreview) {
            let idx = 0;
            function tryNext() {
                if (idx >= EXTS.length) return;

                let imgUrl = currentPath + "DOMAIN" + page + "." + EXTS[idx];
                let img = new Image();

                img.onload = function () {
                    let div = document.createElement("div");
                    div.className = "image-item";
                    div.dataset.page = page;
                    div.innerHTML = `
                        <p>第${page}页</p>
                        ${needPreview ? `<img src="${imgUrl}">` : ''}
                        <br>
                        <a href="${imgUrl}" class="download-btn" download>下载第${page}页</a>
                    `;
                    imageData.push({ page, dom: div, url: imgUrl });
                    sortAndRender(needPreview);
                    document.getElementById("batchDownBtn").style.display = "inline-block";
                };

                img.onerror = function () {
                    idx++;
                    tryNext();
                };
                img.src = imgUrl;
            }
            tryNext();
        }

        // 按页码从小到大排序
        function sortAndRender(needPreview) {
            imageData.sort((a, b) => a.page - b.page);
            const box = document.getElementById("imageBox");
            box.innerHTML = "";
            if (needPreview) {
                imageData.forEach(item => box.appendChild(item.dom));
            }
        }

        // 批量自动下载
        function batchDownload() {
            imageData.sort((a, b) => a.page - b.page);
            imageData.forEach(item => {
                let a = document.createElement("a");
                a.href = item.url;
                a.download = "DOMAIN" + item.page;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }
    </script>
</body>
</html>
